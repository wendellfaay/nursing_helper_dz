name: Flutter CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run unit & widget tests
        run: flutter test --no-pub

  integration_tests:
    name: Integration Tests (Android emulator)
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Android SDK tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libqt5widgets5 libpulse0 qemu-kvm
          yes | sdkmanager --licenses || true

      - name: Install Android system image and tools
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "system-images;android-30;google_apis;x86_64"

      - name: Create and start AVD
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          echo no | avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64" --force
          $ANDROID_SDK_ROOT/emulator/emulator -avd test -no-audio -no-window &
          adb wait-for-device
          adb devices

      - name: Pub get
        run: flutter pub get

      - name: Run integration tests
        run: |
          flutter test integration_test/app_test.dart -d android --no-pub

  build_apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nursing-helper-dz-apk
          path: build/app/outputs/flutter-apk/*.apk
